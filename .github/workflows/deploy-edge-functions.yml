name: Deploy Supabase Edge Functions

# Läuft automatisch wenn:
#   - in supabase/functions/** etwas committed wurde (push auf main)
#   - oder manuell vom „Run workflow"-Knopf im Actions-Tab
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch: # manuell ausführbar

# Project-Ref liegt fest beim ArtCyc-Coach-Projekt. Der Access-Token kommt
# aus den Repo-Secrets (Settings → Secrets and variables → Actions).
env:
  SUPABASE_PROJECT_REF: cpxsfctijcsezkspjlxy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy chat function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN-Secret fehlt. Lege es an:"
            echo "::error::1. Token holen: https://supabase.com/dashboard/account/tokens"
            echo "::error::2. Als Secret 'SUPABASE_ACCESS_TOKEN' speichern:"
            echo "::error::   https://github.com/${{ github.repository }}/settings/secrets/actions/new"
            exit 1
          fi
          supabase functions deploy chat \
            --project-ref "$SUPABASE_PROJECT_REF" \
            --no-verify-jwt
