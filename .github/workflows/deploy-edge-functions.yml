name: Deploy Supabase Edge Functions

# Läuft automatisch wenn:
#   - in supabase/functions/** etwas committed wurde (push auf main)
#   - in docs/*.sql etwas committed wurde (DB-Migrationen)
#   - oder manuell vom „Run workflow"-Knopf im Actions-Tab
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'docs/*.sql'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch: # manuell ausführbar

# Project-Ref liegt fest beim ArtCyc-Coach-Projekt. Der Access-Token kommt
# aus den Repo-Secrets (Settings → Secrets and variables → Actions).
env:
  SUPABASE_PROJECT_REF: cpxsfctijcsezkspjlxy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify token + CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Token length: ${#SUPABASE_ACCESS_TOKEN}"
          echo "Token prefix: ${SUPABASE_ACCESS_TOKEN:0:4}..."
          echo "Supabase CLI version:"
          supabase --version
          echo "Function file:"
          ls -la supabase/functions/chat/

      - name: Apply DB-Setup-Skripte (idempotent)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN-Secret fehlt."
            exit 1
          fi
          # Alle docs/*-setup.sql und docs/*-seed.sql Files via Supabase
          # Management API auf die DB anwenden. Die Skripte selbst sind
          # idempotent (CREATE IF NOT EXISTS, ON CONFLICT DO UPDATE, ...)
          # — können also gefahrlos bei jedem Lauf erneut ausgeführt werden.
          shopt -s nullglob
          for sql in docs/*-setup.sql docs/*-seed.sql; do
            echo "─── $sql ───"
            PAYLOAD=$(jq -Rs '{query: .}' < "$sql")
            HTTP_CODE=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_REF/database/query" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            cat /tmp/resp.json; echo
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "::error::SQL '$sql' fehlgeschlagen (HTTP $HTTP_CODE)"
              exit 1
            fi
            echo "::notice::$sql ausgefuehrt HTTP $HTTP_CODE"
          done

      - name: Push Edge-Function-Secrets aus GitHub-Secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          FEEDBACK_EMAIL:        ${{ secrets.FEEDBACK_EMAIL }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:       ${{ secrets.ANTHROPIC_MODEL }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL:      ${{ secrets.OPENROUTER_MODEL }}
          CRON_SECRET:           ${{ secrets.CRON_SECRET }}
        run: |
          # Sync optionaler Function-Secrets aus GitHub auf Supabase.
          # Wenn ein GitHub-Secret nicht gesetzt ist, wird der Eintrag
          # auf Supabase nicht angefasst (kein Reset auf leer).
          push_secret () {
            local name="$1"; local val="$2"
            if [ -z "$val" ]; then
              echo "::notice::$name ist in GitHub nicht gesetzt — überspringe."
              return 0
            fi
            echo "Setting $name on Supabase..."
            supabase secrets set "$name=$val" --project-ref "$SUPABASE_PROJECT_REF"
          }
          push_secret RESEND_API_KEY      "$RESEND_API_KEY"
          push_secret FEEDBACK_EMAIL      "$FEEDBACK_EMAIL"
          push_secret ANTHROPIC_API_KEY   "$ANTHROPIC_API_KEY"
          push_secret ANTHROPIC_MODEL     "$ANTHROPIC_MODEL"
          push_secret OPENROUTER_API_KEY  "$OPENROUTER_API_KEY"
          push_secret OPENROUTER_MODEL    "$OPENROUTER_MODEL"
          push_secret CRON_SECRET         "$CRON_SECRET"

      - name: Deploy all functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Alle Functions im supabase/functions-Ordner deployen.
          # JWT-Verification bleibt aktiv (Default) — sowohl chat als
          # auch submit-feedback prüfen den User-Token selbst.
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            echo "Deploying function: $name"
            supabase functions deploy "$name" --project-ref "$SUPABASE_PROJECT_REF"
          done
