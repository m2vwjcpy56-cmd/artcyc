<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bgB)"/>

  <!-- Two interlocking wheels (front & rear of a Kunstrad / artistic move arc) -->
  <g fill="none" stroke="#FBBF24" stroke-width="16" stroke-linecap="round">
    <!-- Big wheel (rear) -->
    <circle cx="200" cy="320" r="110"/>
    <!-- Small wheel (front, raised — suggesting wheelie) -->
    <circle cx="380" cy="220" r="60" stroke-width="12"/>
    <!-- Frame connecting the two wheels (tilted arc) -->
    <path d="M 200 320 L 380 220" stroke-width="10"/>
    <!-- Seat post / handle bar -->
    <path d="M 270 250 L 300 200" stroke-width="10"/>
  </g>

  <!-- Rider mark on top -->
  <circle cx="305" cy="160" r="22" fill="#FBBF24"/>
</svg>
