<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bgC)"/>

  <!-- Stylized "AC" monogram inside a rotating wheel motif -->

  <!-- Outer wheel (broken arc to suggest rotation) -->
  <g fill="none" stroke="#FBBF24" stroke-width="14" stroke-linecap="round">
    <path d="M 132 256 A 124 124 0 1 1 380 256" />
    <path d="M 380 256 A 124 124 0 0 1 360 322" stroke-width="10" opacity="0.6"/>
    <path d="M 132 256 A 124 124 0 0 0 152 322" stroke-width="10" opacity="0.6"/>
  </g>

  <!-- Letter A built from clean strokes -->
  <g fill="none" stroke="#FBBF24" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <!-- A: left leg -->
    <path d="M 192 350 L 240 180"/>
    <!-- A: right leg -->
    <path d="M 320 350 L 272 180"/>
    <!-- A: crossbar -->
    <path d="M 216 270 L 296 270"/>
    <!-- A: peak -->
    <path d="M 240 180 L 256 156 L 272 180"/>
  </g>
</svg>
